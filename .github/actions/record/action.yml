name: clomp record
description: >-
  Append a tamper-evident audit event to a clomp installation — log deploys,
  patches and pipeline activities from CI.
branding:
  icon: check-circle
  color: green

inputs:
  api-url:
    description: Base URL of the clomp installation (e.g. https://clomp.example.com)
    required: true
  api-key:
    description: clomp API key (clomp_live_…) — store it as a repository secret
    required: true
  action:
    description: Namespaced audit action, e.g. patch.applied
    required: true
  actor:
    description: Actor as type:id
    default: service:github-actions
  target:
    description: Target as type:id (optional)
    default: ''
  context:
    description: Free-form JSON context (optional)
    default: ''
  occurred-at:
    description: ISO 8601 backfill timestamp (optional)
    default: ''

runs:
  using: composite
  steps:
    - name: Record audit event
      shell: bash
      env:
        CLOMP_API_URL: ${{ inputs.api-url }}
        CLOMP_API_KEY: ${{ inputs.api-key }}
      run: |
        ARGS=(record "${{ inputs.action }}" --actor "${{ inputs.actor }}")
        [ -n "${{ inputs.target }}" ] && ARGS+=(--target "${{ inputs.target }}")
        [ -n "${{ inputs.context }}" ] && ARGS+=(--context '${{ inputs.context }}')
        [ -n "${{ inputs.occurred-at }}" ] && ARGS+=(--occurred-at "${{ inputs.occurred-at }}")
        npx -y -p @clomp/sdk-node clomp "${ARGS[@]}"
