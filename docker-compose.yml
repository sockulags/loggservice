services:
  postgres:
    image: postgres:16-alpine
    container_name: clomp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clomp}
      POSTGRES_USER: ${POSTGRES_USER:-clomp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      # Bind to loopback only: the backend reaches Postgres over the compose
      # network, the host mapping exists solely for local inspection/debugging
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clomp} -d ${POSTGRES_DB:-clomp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    # Prebuilt image from GHCR; `docker compose build` still works for local dev
    image: ghcr.io/sockulags/clomp-backend:${CLOMP_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clomp-backend
    ports:
      - target: 3000
        published: "${BACKEND_PORT:-3001}"
        protocol: tcp
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-clomp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-clomp}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:8080,http://localhost:5173}
      - METRICS_ENABLED=${METRICS_ENABLED:-}
      - METRICS_TOKEN=${METRICS_TOKEN:-}
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  web-ui:
    image: ghcr.io/sockulags/clomp-web-ui:${CLOMP_VERSION:-latest}
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: clomp-web-ui
    ports:
      - target: 80
        published: "${WEBUI_PORT:-8080}"
        protocol: tcp
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  backend-data:
